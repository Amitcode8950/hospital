  16. HEALTH CALCULATOR (4-IN-1)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  URL: /health-calc  (Login required)

  A. BMI CALCULATOR
     • Input: Height (cm) + Weight (kg) via sliders
     • Output: BMI score, category (Underweight/Normal/Overweight/Obese)
     • Shows ideal weight range for your height
     • Visual WHO BMI scale with colour bands

  B. DAILY WATER INTAKE CALCULATOR
     • Input: Weight, Activity Level, Climate
     • Formula: Weight × 33ml + activity bonus + climate bonus
     • Output: Litres per day + number of 250ml glasses
     • Tip: time between glasses while awake

  C. HEART RATE TRAINING ZONES
     • Input: Age + Resting Heart Rate
     • Formula: Karvonen (Heart Rate Reserve method)
     • Output: 5 training zones with exact bpm ranges:
         Zone 1 — Recovery    (50–60%)
         Zone 2 — Fat Burn    (60–70%)
         Zone 3 — Aerobic     (70–80%)
         Zone 4 — Threshold   (80–90%)
         Zone 5 — Max Effort  (90–100%)

  D. CALORIE & MACRO CALCULATOR
     • Input: Gender, Age, Height, Weight, Activity, Goal
     • Formula: Mifflin-St Jeor BMR × Activity Factor (TDEE)
     • Goals: Lose Weight (−500 kcal) | Maintain | Build Muscle (+300 kcal)
     • Output: Daily calories + Protein/Carb/Fat macros in grams

