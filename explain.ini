  2. MEDICAL RECORDS (BLOCKCHAIN-SECURED)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  DASHBOARD  →  /dashboard
    Patients: See all their own records
    Doctors:  See records they created

  ADD RECORD  →  /add-record  (Doctors only)
  ┌─────────────────────────────────────────────────────────┐
  │ Fields: Patient Name, Diagnosis, Prescription, Notes,   │
  │         Symptoms, Allergies, Follow-up Date             │
  │ On save → record is SHA-256 hashed and added to the     │
  │ blockchain with the previous block's hash (chain link)  │
  └─────────────────────────────────────────────────────────┘

  VIEW RECORD  →  /record/:id
    Full record details with hash, block data, share button

  SHARE RECORDS
    • Click "Share" on any record → generates a secure URL
    • Link expires in 24 hours
    • Anyone with the link can view (no login required)
    • URL format: /share/:token

  BLOCKCHAIN SECURITY:
    • Each record stores: SHA-256 hash of (data + previous hash)
    • Chain links records in sequence — tampering breaks the chain
    • Validated via /blockchain explorer

