  5. DOCTOR CONFIRM / REJECT FLOW
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  FULL FLOW:
  ┌─────────────────────────────────────────────────────────┐
  │  Patient books → Doctor gets email alert               │
  │       ↓                                                  │
  │  Doctor logs in → Profile → "Patient Requests" tab      │
  │       ↓                                                  │
  │  Doctor clicks "Respond" on any booking                 │
  │       ↓                                                  │
  │  Optionally types a message to patient                  │
  │       ↓                                                  │
  │  Clicks ✅ Confirm  OR  ❌ Reject                        │
  │       ↓                                                  │
  │  Patient instantly receives HTML email with:            │
  │    - Decision (Confirmed/Rejected)                       │
  │    - Doctor's message                                    │
  │    - Full appointment details                            │
  │    - Link to My Bookings page                            │
  └─────────────────────────────────────────────────────────┘

  DOCTOR PROFILE TAB:
    • "🔔 Patient Requests" tab (first tab for doctors)
    • Red badge shows count of PENDING requests
    • Each card shows: patient name, email, date, time, fee, payment method
    • Inline response panel slides open — no page reload

  BOOKING STATES AFTER DOCTOR ACTION:
    Confirm → doctor_action: "confirmed", booking status stays "confirmed"
    Reject  → doctor_action: "rejected",  booking status set to "cancelled"

  API ENDPOINT:
    PUT /api/bookings/:id/action
    Body: { action: "confirmed" | "rejected", doctor_notes: "string" }

