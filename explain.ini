  4. PAYMENT GATEWAY (RAZORPAY + CASH)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ONLINE PAYMENT (Razorpay)
  ┌─────────────────────────────────────────────────────────┐
  │ Supported: UPI, Debit/Credit Card, Net Banking, Wallets  │
  │                                                          │
  │ Flow:                                                    │
  │  1. Book → choose "Pay Online"                           │
  │  2. Backend creates Razorpay order (in paise)            │
  │  3. Razorpay checkout popup opens in browser             │
  │  4. Patient completes payment                            │
  │  5. Server verifies HMAC-SHA256 signature                │
  │  6. Booking marked as "paid" in database                 │
  │  7. Patient can download payment receipt (JSON)          │
  └─────────────────────────────────────────────────────────┘

  WEBHOOK (server-side)
    • URL: POST /api/payments/webhook
    • Handles: payment.captured, payment.failed, refund.processed
    • Verifies Razorpay webhook signature before processing
    • Set in Razorpay Dashboard → Settings → Webhooks

  REFUND
    • API: POST /api/payments/refund
    • Full refund to original payment method
    • Credited within 5-7 business days
    • Booking status set to cancelled after refund

  CASH ON DELIVERY (Pay at Visit)
    • No upfront payment required
    • Booking confirmed instantly
    • Payment status: "cod"
    • Patient pays cash at clinic/lab

  MOCK MODE (Development)
    • If Razorpay keys are placeholder values → mock mode activates
    • Mock order created, payment auto-verified
    • Useful for testing without real Razorpay account

  PAYMENT STATUSES:
    pending  → Online order created, not paid yet
    paid     → Online payment verified
    cod      → Cash on delivery / pay at visit
    failed   → Payment failed or signature mismatch

  PAYMENT RECEIPT
    • GET /api/payments/receipt/:bookingId
    • Returns: receipt_no, transaction ID, patient info,
               booking details, amount, payment method

  API ENDPOINTS:
    POST /api/payments/create-order   → Create Razorpay order
    POST /api/payments/verify         → Verify payment signature
    POST /api/payments/webhook        → Razorpay server webhook
    GET  /api/payments/status/:id     → Payment status check
    GET  /api/payments/receipt/:id    → Download receipt
    POST /api/payments/refund         → Initiate refund

