    Icons:       Emoji-based
    Charts:      Custom SVG (no external library)

  BACKEND
    Runtime:     Node.js
    Framework:   Express.js
    Database:    MongoDB with Mongoose (auto in-memory if no URI set)
    Auth:        JWT (jsonwebtoken) + bcrypt
    Email:       Nodemailer (Gmail OAuth2 / App Password / Ethereal)
    Payment:     Razorpay Node SDK
    AI:          Google Generative AI (@google/generative-ai) — Gemini 1.5 Flash
    Hashing:     Node.js crypto (SHA-256 for blockchain)

  DATABASE COLLECTIONS
    users            — Accounts (patients + doctors)
    medicalrecords   — Blockchain-linked patient records
    audits           — Blockchain block chain
    sharelinks       — Time-limited record share tokens
    medicines        — Medicine price database
    specialists      — Doctor profiles
    diagnosticcenters — Lab profiles
    hospitalprocedures — Procedure pricing
    bookings         — All appointment bookings
    vitals           — Patient vitals readings

