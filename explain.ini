  1. AUTHENTICATION & ACCOUNTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  REGISTER  →  /register
  ┌─────────────────────────────────────────────────────────┐
  │ • Fill: Full Name, Email, Password, Role (Patient/Doctor)│
  │ • Submit → OTP sent to your email (6-digit, 10 min valid)│
  │ • Enter OTP on /verify-email page                        │
  │ • Account activated → redirected to login                │
  └─────────────────────────────────────────────────────────┘

  LOGIN  →  /login
  ┌─────────────────────────────────────────────────────────┐
  │ • Enter email + password                                 │
  │ • Receive JWT token stored in localStorage               │
  │ • Redirected to /dashboard on success                    │
  └─────────────────────────────────────────────────────────┘

  ROLES:
    Patient  — Book appointments, view records, track vitals
    Doctor   — Confirm/reject bookings, create medical records, manage ER triage

  SECURITY:
    • Passwords hashed with bcrypt (10 rounds)
    • JWT tokens (7-day expiry) for all protected routes
    • Email OTP verification via Gmail SMTP / OAuth2
    • All sensitive API routes protected with auth middleware

