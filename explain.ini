  3. APPOINTMENT BOOKING SYSTEM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  HOW TO BOOK (3-Step Modal)

  Step 1 — Pick Date & Time
    • Shows next 7 days (today + 6)
    • Time slots: Morning (9:00–10:00), Afternoon (12:00–1:00),
                  Evening (5:00–6:00; 3:00–4:00 for labs)
    • Optional: Patient notes to the doctor

  Step 2 — Review Booking
    • See doctor name, specialty, hospital, date, time, fee
    • Confirm all details before payment

  Step 3 — Choose Payment
    • Option A: 💳 Pay Online (Razorpay)
    • Option B: 💵 Cash / Pay at Visit (confirm instantly)

  BOOKING TYPES:
    • Doctor Consultation  (from /specialists page)
    • Lab Test             (from /diagnostics page)
    • Hospital Procedure   (from /hospital-pricing page)

  BOOKING FIELDS STORED:
    user_id, user_name, user_email, type, item_id, item_name,
    sub_item, location, city, date, time_slot, amount,
    payment_method, payment_status, status,
    doctor_action, doctor_notes, doctor_email,
    razorpay_order_id, razorpay_payment_id, notes

